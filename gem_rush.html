<!DOCTYPE html>
<html>
<head>
    <title>Collect the Gems!</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P" rel="stylesheet">
    <style>
    body {
        font-family: "Press Start 2P", sans-serif;
    }
    #game-container {
        position: relative;
    }
    canvas, #counter, #game-start, #game-over {
        position: absolute;
        top: 0px;
        left: 0px;
    }
    canvas, #game-start, #game-over {
        border: 1px solid gray;
        width: 854px;
        height: 480px;
    }
    canvas {
        background: url(background.png);
        background-size: cover;
    }
    #game-start, #game-over {
        background: rgba(1, 1, 1, 0.8);
    }
    #counter text {
        font-size: 130%;
        fill: white;
        stroke: black;
        stroke-width: 1px;
    }
    #game-start text {
        font-size: 150%;
        fill: white;
        text-anchor: middle;
    }
    #game-start #game-title {
        font-size: 400%;
        fill: url(#title-fill);
        stroke: black;
    }
    #game-over-text {
        font-size: 200%;
        fill: url(#game-over-fill);
        text-anchor: middle;
        font-weight: bold;
    }
    #win-lose-text {
        font-size: 120%;
        fill: url(#game-over-fill);
        text-anchor: middle;
        font-weight: bold;
    }
    #try-again-text {
        font-size: 120%;
        fill: url(#game-over-fill);
        text-anchor: middle;
        font-weight: bold;
    }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas width="854px" height="480px"></canvas>

        <svg xmlns="http://www.w3.org/2000/svg" id="counter">
            <text x="10" y="35">
                TIME:<tspan id="time-remaining">20</tspan>
            </text>
        </svg>

        <svg xmlns="http://www.w3.org/2000/svg" id="game-start">
            <defs>
                <linearGradient id="title-fill" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0.2" stop-color="red" />
                    <stop offset="0.4" stop-color="yellow" />
                    <stop offset="0.6" stop-color="green" />
                    <stop offset="0.8" stop-color="purple" />
                </linearGradient>
            </defs>
            <text id="game-title" x="50%" y="45%">GEM RUSH!</text>
            <text x="50%" y="60%">Click here to start the game</text>
        </svg>

        <svg xmlns="http://www.w3.org/2000/svg" id="game-over" style="display: none">
            <g id="game-over-text">
                <defs>
                    <linearGradient id="game-over-fill" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0" stop-color="red" />
                        <stop offset="0.7" stop-color="orange" />
                        <stop offset="1" stop-color="yellow" />
                    </linearGradient>
                </defs>
                <text x="50%" y="15%">
                    GAME OVER
                </text>
            </g>
            
            <g id="win-lose-text">
                <text x="50%" y="22%">
                    YOU LOSE!
                </text>
            </g>

            <g transform="translate(0, 50)">
                <rect x="8%" y="15%" width="40%" height="50%" rx="10" ry="10" fill="#F5F5DC" fill-opacity="0.7" />
                <text x="28%" y="23%" font-weight="bold" text-anchor="middle" font-size="15">Game Statistics</text>
                <text x="10%" y="35%" font-size="12">Total points: </text>
                <text x="10%" y="45%" font-size="12">Successful hits: </text>
                <text x="10%" y="55%" font-size="12">Longest rally: </text>
            </g>
            
            <g transform="translate(40%, 50)">
                <rect x="52%" y="25%" width="40%" height="50%" rx="10" ry="10" fill="#F5F5DC" fill-opacity="0.7" />
                <text x="72%" y="33%" font-weight="bold" text-anchor="middle" font-size="15">Ranking</text>
                <g>
                    <text x="55%" y="43%" font-size="12">1. Player1</text>
                    <text x="78%" y="43%" font-size="12">M: </text>
                    <text x="85%" y="43%" font-size="12">P: </text>
                </g>
                <g>
                    <text x="55%" y="49%" font-size="12">2. Player2</text>
                    <text x="78%" y="49%" font-size="12">M: </text>
                    <text x="85%" y="49%" font-size="12">P: </text>
                </g>
                <g>
                    <text x="55%" y="55%" font-size="12">3. Player3</text>
                    <text x="78%" y="55%" font-size="12">M: </text>
                    <text x="85%" y="55%" font-size="12">P: </text>
                </g>
                <g>
                    <text x="55%" y="61%" font-size="12">4. Player4</text>
                    <text x="78%" y="61%" font-size="12">M: </text>
                    <text x="85%" y="61%" font-size="12">P: </text>
                </g>
                <g>
                    <text x="55%" y="67%" font-size="12">5. Player5</text>
                    <text x="78%" y="67%" font-size="12">M: </text>
                    <text x="85%" y="67%" font-size="12">P: </text>
                </g>
            </g>
            
            <g id="try-again-text">
                <text x="50%" y="85%">
                    PLAY AGAIN?
                </text>
            </g>

            <g id="button-choices">
                <defs>
                    <linearGradient id="button-fill" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0" stop-color="yellow" />
                        <stop offset="0.5" stop-color="orange" />
                        <stop offset="1" stop-color="red" />
                    </linearGradient>
                </defs>

                <!-- Button for YES -->
                <rect x="40%" y="87%" width="70" height="25" rx="5" ry="5" fill="url(#button-fill)" />
                <text font-size="12" x="44%" y="91%" text-anchor="middle" fill="black">
                    YES
                </text>
                
                <!-- Button for NO -->
                <rect x="50%" y="87%" width="70" height="25" rx="5" ry="5" fill="url(#button-fill)" />
                <text font-size="12" x="54%" y="91%" text-anchor="middle" fill="black">
                    NO
                </text>
            </g>
        
        </svg>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.1.min.js"></script>
    <script src="bounding_box.js"></script>
    <script src="sprite.js"></script>
    <script src="player.js"></script>
    <script src="gem.js"></script>
    <script src="fire.js"></script>
    <script>
    $(function() {
        /* Get the canvas and 2D context */
        const cv = $("canvas").get(0);
        const context = cv.getContext("2d");

        /* Create the sounds */
        const sounds = {
            background: new Audio("background.mp3"),
            collect: new Audio("collect.mp3"),
            gameover: new Audio("gameover.mp3")
        };

        const totalGameTime = 20;   // Total game time in seconds
        const gemMaxAge = 3000;     // The maximum age of the gems in milliseconds
        let gameStartTime = 0;      // The timestamp when the game starts
        let collectedGems = 0;      // The number of gems collected in the game

        /* Create the game area */
        const gameArea = BoundingBox(context, 165, 60, 420, 800);

        /* Create the sprites in the game */
        const player = Player(context, 427, 240, gameArea); // The player
        const gem = Gem(context, 427, 350, "green");        // The gem
        const fire = [
            Fire(context, gameArea.getPoints().topLeft[0],gameArea.getPoints().topLeft[1]),
            Fire(context, gameArea.getPoints().topRight[0],gameArea.getPoints().topRight[1]),
            Fire(context, gameArea.getPoints().bottomRight[0],gameArea.getPoints().bottomRight[1]),
            Fire(context, gameArea.getPoints().bottomLeft[0],gameArea.getPoints().bottomLeft[1]),
        ];

        /* The main processing of the game */
        function doFrame(now) {
            if (gameStartTime == 0) gameStartTime = now;

            /* Update the time remaining */
            const gameTimeSoFar = now - gameStartTime;
            const timeRemaining = Math.ceil((totalGameTime * 1000 - gameTimeSoFar) / 1000);
            $("#time-remaining").text(timeRemaining);


            /* TODO */
            /* Handle the game over situation here */
            if (timeRemaining == 0){
                //document.getElementById("final-gems").innerHTML = collectedGems;
                $("#game-over").show();
                $("#info-cards").show();
                sounds.background.pause();
                sounds.collect.pause();
                sounds.gameover.currentTime = 0;
                sounds.gameover.play()
                return;
            }

            /* Update the sprites */
            gem.update(now);
            player.update(now);
            fire[0].update(now);
            fire[1].update(now);
            fire[2].update(now);
            fire[3].update(now);



            /* TODO */
            /* Randomize the gem and collect the gem here */
            let interval = gem.getAge(now);
            const playerBox = player.getBoundingBox();
            const gemPosition = gem.getXY();
            const gemCenterX = gemPosition.x; //get the gem's center, scaled
            const gemCenterY = gemPosition.y; //get the gem's center, scaled
            if (playerBox.isPointInBox(gemCenterX, gemCenterY)) {
                sounds.collect.currentTime = 0;
                sounds.collect.play();
                collectedGems++;
                gem.randomize(gameArea);
                interval = gem.getAge(now);
            } 
            if (parseInt(interval) >= gemMaxAge){
                gem.randomize(gameArea);
            }
            
            /* Clear the screen */
            context.clearRect(0, 0, cv.width, cv.height);

            /* Draw the sprites */
            gem.draw();
            player.draw();
            fire[0].draw();
            fire[1].draw();
            fire[2].draw();
            fire[3].draw();


            /* Process the next frame */
            requestAnimationFrame(doFrame);
        }

        /* Handle the start of the game */
        $("#game-start").on("click", function() {
            /* Hide the start screen */
            $("#game-start").hide();
            gem.randomize(gameArea);
            sounds.background.currentTime = 0;
            sounds.background.play();
            /* Handle the keydown of arrow keys and spacebar */
            $(document).on("keydown", function(event) {


                /* TODO */
                /* Handle the key down */
                const direction = event.keyCode;
                if (direction == 37){
                    player.move(1);
                } else if (direction == 38){
                    player.move(2);
                } else if (direction == 39){
                    player.move(3);
                } else if (direction == 40){
                    player.move(4);
                } else if(direction == 32){
                    player.speedUp();
                }

            });

            /* Handle the keyup of arrow keys and spacebar */
            $(document).on("keyup", function(event) {


                /* TODO */
                /* Handle the key up */
                const direction = event.keyCode;
                if (direction == 37){
                    player.stop(1);
                } else if (direction == 38){
                    player.stop(2);
                } else if (direction == 39){
                    player.stop(3);
                } else if (direction == 40){
                    player.stop(4);
                } else if(direction == 32){
                    player.slowDown();
                }



            });

            /* Start the game */
            requestAnimationFrame(doFrame);
        });
    });
    </script>
</body>
</html>
